<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>3-DOF Manipulator | LSPB & Path Trace</title>
		<style>
			body {
				margin: 0;
				overflow: hidden;
				font-family: "Inter", sans-serif;
				background: #0a0a0a;
				color: #fff;
			}
			#ui {
				position: absolute;
				top: 15px;
				left: 15px;
				background: rgba(15, 15, 15, 0.95);
				padding: 20px;
				border-radius: 12px;
				width: 300px;
				border: 1px solid #333;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
				z-index: 100;
			}
			.group {
				margin-bottom: 18px;
				padding-bottom: 10px;
				border-bottom: 1px solid #222;
			}
			label {
				display: block;
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 1px;
				color: #00ff88;
				margin-bottom: 8px;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 5px;
				font-size: 12px;
			}
			input[type="range"] {
				flex: 1;
				accent-color: #00ff88;
			}
			.val-display {
				width: 30px;
				text-align: right;
				font-family: monospace;
				color: #aaa;
			}
			button {
				width: 100%;
				padding: 12px;
				background: #007bff;
				border: none;
				color: white;
				border-radius: 6px;
				cursor: pointer;
				font-weight: bold;
				transition: 0.3s;
			}
			button:hover {
				background: #0056b3;
				box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
			}
		</style>
	</head>
	<body>
		<div id="ui">
			<h3 style="margin-top: 0">3-DOF Robot Planner</h3>

			<div class="group">
				<label>Start Pose (XYZ)</label>
				<div class="row">
					X <input type="range" id="sx" min="-6" max="6" step="0.1" value="-5" /><span
						class="val-display"
					></span>
				</div>
				<div class="row">
					Y <input type="range" id="sy" min="0" max="8" step="0.1" value="4" /><span
						class="val-display"
					></span>
				</div>
				<div class="row">
					Z <input type="range" id="sz" min="-6" max="6" step="0.1" value="-1" /><span
						class="val-display"
					></span>
				</div>
			</div>

			<div class="group">
				<label>Goal Pose (XYZ)</label>
				<div class="row">
					X <input type="range" id="gx" min="-6" max="6" step="0.1" value="5" /><span
						class="val-display"
					></span>
				</div>
				<div class="row">
					Y <input type="range" id="gy" min="0" max="8" step="0.1" value="6" /><span
						class="val-display"
					></span>
				</div>
				<div class="row">
					Z <input type="range" id="gz" min="-6" max="6" step="0.1" value="-1" /><span
						class="val-display"
					></span>
				</div>
			</div>

			<div class="group">
				<label>Timing (Seconds)</label>
				<div class="row">
					T <input type="range" id="duration" min="1" max="10" step="0.5" value="3" /><span
						class="val-display"
					></span>
				</div>
			</div>

			<button id="runBtn">Execute Trajectory</button>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>
		<script type="module" src="robot.js"></script>
	</body>
</html>
